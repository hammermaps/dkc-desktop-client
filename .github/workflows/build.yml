name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore DkcDesktopClient.slnx

      - name: Build
        run: dotnet build DkcDesktopClient.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DkcDesktopClient.Tests/DkcDesktopClient.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish DkcDesktopClient.App/DkcDesktopClient.App.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true --output ./publish/${{ matrix.rid }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dkc-desktop-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}/
