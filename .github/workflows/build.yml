name: Build

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            asset_name: DkcDesktopClient-linux-x64
          - os: windows-latest
            rid: win-x64
            asset_name: DkcDesktopClient-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore DkcDesktopClient.slnx

      - name: Build
        run: dotnet build DkcDesktopClient.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DkcDesktopClient.Tests/DkcDesktopClient.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=1.0.0" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Publish
        run: dotnet publish DkcDesktopClient.App/DkcDesktopClient.App.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.value }} --output ./publish/${{ matrix.rid }}

      - name: Rename binary (Linux)
        if: matrix.rid == 'linux-x64'
        run: mv ./publish/${{ matrix.rid }}/DkcDesktopClient.App ./publish/${{ matrix.rid }}/${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.rid == 'win-x64'
        run: Rename-Item -Path ./publish/${{ matrix.rid }}/DkcDesktopClient.App.exe -NewName ${{ matrix.asset_name }}
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dkc-desktop-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}/${{ matrix.asset_name }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: ./publish/${{ matrix.rid }}/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          generate_release_notes: true
